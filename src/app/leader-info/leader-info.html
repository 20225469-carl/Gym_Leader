<div class="leader-card">
    <h3 [style.color]="leader.typeColor">{{ leader.name }}</h3>
    <div class="leader-details">
      <p><strong>Age:</strong> {{ leader.age }}</p>
      <p><strong>Location:</strong> {{ leader.location }}</p>
      <p><strong>Gym Badge:</strong> {{ leader.badge }}</p>
    </div>
    <div class="pokemon-team">
      <h4>Gym Roster:</h4>
      <ul>
        @for (poke of leader.team; track poke.name) {
          <li>{{ poke.name }} (Lv. {{ poke.level }})</li>
        }
      </ul>
    </div>
    <button class="action-btn" (click)="toggleDescription()">
      {{ isDescriptionVisible() ? 'Hide Monologue' : 'Show Monologue/Description/Motto' }}
    </button>
    @if (isDescriptionVisible()) {
      <div class="monologue-box">
        <p><em>"{{ leader.intro }}"</em></p>
      </div>
    }
  </div>
